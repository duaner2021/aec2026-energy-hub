<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AEC2026 Energy Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0d0d0d;
      --orange: #D16413;
      --white:  #F0EBE3;
      --gray:   #555;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Fira Code', monospace;
      overflow: hidden;
    }

    /* Subtle noise */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      color: var(--orange);
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0;
      animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    .line {
      display: block;
      width: 32px;
      height: 1px;
      background: var(--orange);
      margin: 0 auto 20px;
      opacity: 0;
      animation: expand 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    @keyframes expand {
      from { width: 0; opacity: 0; }
      to   { width: 32px; opacity: 1; }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--white);
      line-height: 1.3;
      margin-bottom: 20px;
      opacity: 0;
      animation: rise 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.65s forwards;
    }

    .sub {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--gray);
      opacity: 0;
      animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.85s forwards;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="line"></span>
    <p class="eyebrow">AEC2026 Energy Hub</p>
    <h1>This site is no longer active.</h1>
    <p class="sub">Thank you for visiting.</p>
  </div>
</body>
</html>
